name: Compilar FinancasFacil para Play Store

on:
  push:
    branches: [ main, principal ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
      - name: Criar projeto Flutter novo
        run: flutter create --project-name financasfacil_app temp_app
      - name: Copiar codigo fonte
        run: |
          cp -r financasfacil/lib/* temp_app/lib/
          cp financasfacil/pubspec.yaml temp_app/pubspec.yaml
      - name: Corrigir minSdkVersion
        run: |
          sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 21/' temp_app/android/app/build.gradle
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/' temp_app/android/app/build.gradle
          cat temp_app/android/app/build.gradle
      - name: Instalar dependencias
        run: flutter pub get
        working-directory: temp_app
      - name: Adicionar http
        run: flutter pub add http
        working-directory: temp_app
      - name: Compilar AAB
        run: flutter build appbundle --release
        working-directory: temp_app
      - uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: temp_app/build/app/outputs/bundle/release/app-release.aab
