name: Compilar FinancasFacil para Play Store

on:
  push:
    branches: [ main, principal ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
      - name: Instalar dependencias
        run: flutter pub get
        working-directory: financasfacil
      - name: Adicionar http
        run: flutter pub add http
        working-directory: financasfacil
      - name: Compilar AAB
        run: flutter build appbundle --release
        working-directory: financasfacil
      - uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: financasfacil/build/app/outputs/bundle/release/app-release.aab
